spring:
  application:
    name: BNKBotXAPI
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${BNK_DB_URL:jdbc:mariadb://localhost:13307/bnk_botx}
    username: ${BNK_DB_USERNAME:bnk_botx_user}
    password: ${BNK_DB_PASSWORD:bnk_botx_user}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${BNK_API_PORT:8080}

bnk:
  engine:
    base-url: ${BNK_ENGINE_BASE_URL:http://localhost:9000}
  jwt:
    secret: ${BNK_JWT_SECRET:bnk-bot-x-local-development-secret-key-32}
    access-minutes: ${BNK_JWT_ACCESS_MINUTES:30}
    refresh-minutes: ${BNK_JWT_REFRESH_MINUTES:10080}
  cors:
    allowed-origins: ${BNK_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.springframework.security.web: INFO
